<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Навигация с видео</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            height: 100vh;
        }

        .left-column {
            width: 60%;
            display: flex;
            flex-direction: column;
        }

        #map {
            height: calc(100% - 100px);
            min-height: 300px;
        }

        .angles-panel {
            height: 100px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 20px;
            gap: 20px;
            border-top: 2px solid #00adb5;
        }

        .angle-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 8px 15px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }

        .angle-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.15);
        }

        .angle-label {
            font-size: 12px;
            color: #aaa;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .angle-value {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
        }

        .yaw-value { color: #4dc9f6; }
        .pitch-value { color: #f67019; }
        .roll-value { color: #f95a5a; }

        .angle-unit {
            font-size: 12px;
            color: #666;
        }

        .right-column {
            width: 40%;
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 15px;
        }

        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        video {
            width: 100%;
            display: block;
        }

        .slider-container {
            width: 100%;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            background: #2c2c3e;
            height: 4px;
            border-radius: 2px;
            -webkit-appearance: none;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #00adb5;
            cursor: pointer;
        }

        .time-info {
            font-family: monospace;
            font-size: 12px;
            color: #888;
            text-align: center;
            padding: 10px;
            background: #1a1a2e;
            border-radius: 8px;
        }

        .time-info span {
            color: #00adb5;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="left-column">
            <div id="map"></div>
            <div class="angles-panel">
                <div class="angle-card">
                    <div class="angle-label">РЫСКАНИЕ</div>
                    <div class="angle-value yaw-value" id="yaw-val">0.0<span class="angle-unit">°</span></div>
                </div>
                <div class="angle-card">
                    <div class="angle-label">ТАНГАЖ</div>
                    <div class="angle-value pitch-value" id="pitch-val">0.0<span class="angle-unit">°</span></div>
                </div>
                <div class="angle-card">
                    <div class="angle-label">КРЕН</div>
                    <div class="angle-value roll-value" id="roll-val">0.0<span class="angle-unit">°</span></div>
                </div>
            </div>
        </div>
        <div class="right-column">
            <div class="video-container">
                <video id="video" controls>
                    <source src="video.mp4" type="video/mp4">
                </video>
            </div>
            <div class="slider-container">
                <input type="range" id="slider" min="0" max="100" value="0" step="0.01">
            </div>
            <div class="time-info">
                <span id="video-time">0.00</span> с / <span id="total-time">0</span> с
            </div>
        </div>
    </div>

            const bounds = [[Math.min(...lats), Math.min(...lons)], [Math.max(...lats), Math.max(...lons)]];

            }).addTo(map);

        function findNearestPoint(utcTime) {
            let left = 0, right = trajectory.length - 1;
            while (left < right) {
                const mid = Math.floor((left + right) / 2);
                if (trajectory[mid].t < utcTime) left = mid + 1;
                else right = mid;
            }
            const idx = Math.max(0, Math.min(left, trajectory.length - 1));
            if (idx > 0 && Math.abs(trajectory[idx-1].t - utcTime) < Math.abs(trajectory[idx].t - utcTime)) {
                return { point: trajectory[idx-1], index: idx-1 };
            }
            return { point: trajectory[idx], index: idx };
